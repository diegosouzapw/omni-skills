name: Release and Publish

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-verify:
    runs-on: ubuntu-latest
    env:
      OMNI_SKILLS_ENABLE_CLAMAV: "1"
      VT_API_KEY: ${{ secrets.VT_API_KEY || secrets.VIRUSTOTAL }}
    outputs:
      tarball_name: ${{ steps.pack.outputs.tarball_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Verify tag version matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match package version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Verify required release secrets
        env:
          SIGN_PRIVATE_KEY_B64: ${{ secrets.OMNI_SKILLS_SIGN_PRIVATE_KEY_B64 }}
          SIGN_PRIVATE_KEY: ${{ secrets.OMNI_SKILLS_SIGN_PRIVATE_KEY }}
        run: |
          if [ -z "${VT_API_KEY:-}" ]; then
            echo "VT_API_KEY or VIRUSTOTAL is required for release verification."
            exit 1
          fi
          if [ -z "${SIGN_PRIVATE_KEY_B64:-}" ] && [ -z "${SIGN_PRIVATE_KEY:-}" ]; then
            echo "OMNI_SKILLS_SIGN_PRIVATE_KEY_B64 or OMNI_SKILLS_SIGN_PRIVATE_KEY is required for release signing."
            exit 1
          fi

      - name: Prepare signing material
        env:
          SIGN_PRIVATE_KEY_B64: ${{ secrets.OMNI_SKILLS_SIGN_PRIVATE_KEY_B64 }}
          SIGN_PRIVATE_KEY: ${{ secrets.OMNI_SKILLS_SIGN_PRIVATE_KEY }}
          SIGN_PUBLIC_KEY_B64: ${{ secrets.OMNI_SKILLS_SIGN_PUBLIC_KEY_B64 }}
          SIGN_PUBLIC_KEY: ${{ secrets.OMNI_SKILLS_SIGN_PUBLIC_KEY }}
        run: |
          SIGNING_DIR="$RUNNER_TEMP/omni-skills-signing"
          mkdir -p "$SIGNING_DIR"

          if [ -n "${SIGN_PRIVATE_KEY_B64:-}" ]; then
            printf '%s' "$SIGN_PRIVATE_KEY_B64" | base64 --decode > "$SIGNING_DIR/private.pem"
          else
            printf '%s\n' "$SIGN_PRIVATE_KEY" > "$SIGNING_DIR/private.pem"
          fi

          if [ -n "${SIGN_PUBLIC_KEY_B64:-}" ]; then
            printf '%s' "$SIGN_PUBLIC_KEY_B64" | base64 --decode > "$SIGNING_DIR/public.pem"
          elif [ -n "${SIGN_PUBLIC_KEY:-}" ]; then
            printf '%s\n' "$SIGN_PUBLIC_KEY" > "$SIGNING_DIR/public.pem"
          fi

          chmod 600 "$SIGNING_DIR/private.pem"
          echo "OMNI_SKILLS_SIGN_PRIVATE_KEY_PATH=$SIGNING_DIR/private.pem" >> "$GITHUB_ENV"
          if [ -f "$SIGNING_DIR/public.pem" ]; then
            chmod 644 "$SIGNING_DIR/public.pem"
            echo "OMNI_SKILLS_SIGN_PUBLIC_KEY_PATH=$SIGNING_DIR/public.pem" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Install ClamAV
        run: |
          sudo apt-get update
          sudo apt-get install -y clamav clamav-freshclam

      - name: Refresh ClamAV signatures
        run: |
          sudo systemctl stop clamav-freshclam || true
          sudo freshclam

      - name: Run release verification
        run: npm run release:verify

      - name: Package release tarball
        id: pack
        run: |
          TARBALL="$(npm pack | tail -n 1)"
          echo "tarball_name=$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Generate custom release notes
        run: |
          python3 tools/scripts/generate_release_notes.py --output dist/release-notes.md --version "$(node -p "require('./package.json').version")" --tag "${GITHUB_REF_NAME:-}"

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: |
            ${{ steps.pack.outputs.tarball_name }}
            dist/**
            metadata.json
            skills_index.json
            docs/CATALOG.md
            dist/release-notes.md
            dist/signing/**

  publish-npm:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: release-verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Download release bundle
        uses: actions/download-artifact@v4
        with:
          name: release-bundle
          path: .

      - name: Verify npm token is configured
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN is required to publish releases to npm."
            exit 1
          fi

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          TARBALL="$(find . -maxdepth 1 -type f -name 'omni-skills-*.tgz' -print -quit)"
          if [ -z "$TARBALL" ]; then
            echo "No npm tarball was found in the downloaded release bundle."
            exit 1
          fi
          npm publish "$TARBALL" --access public --provenance

      - name: Publish to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TARBALL="$(find . -maxdepth 1 -type f -name 'omni-skills-*.tgz' -print -quit)"
          mkdir -p gh-pkg
          tar -xzf "$TARBALL" -C gh-pkg
          cd gh-pkg/package
          npm pkg set name="@diegosouzapw/omni-skills"
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" > .npmrc
          npm publish --registry=https://npm.pkg.github.com --access public || echo "⚠️ Version might already be published on GitHub."

  publish-github-release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: publish-npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release bundle
        uses: actions/download-artifact@v4
        with:
          name: release-bundle
          path: .

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: dist/release-notes.md
          fail_on_unmatched_files: true
          files: |
            omni-skills-*.tgz
            metadata.json
            skills_index.json
            dist/release-notes.md
            docs/CATALOG.md
            dist/catalog.json
            dist/bundles.json
            dist/archives/*.checksums.txt
            dist/archives/*.sig
            dist/signing/**
