name: Validate Skills

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build generated artifacts
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Check generated artifacts are committed
        run: git diff --exit-code -- metadata.json skills skills_index.json dist docs/CATALOG.md
