name: Validate Skills

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate contribution scope
        if: github.event_name == 'pull_request'
        run: |
          python3 tools/scripts/validate_contribution_scope.py \
            --repository "${GITHUB_REPOSITORY}" \
            --event-path "${GITHUB_EVENT_PATH}" \
            --base-sha "${{ github.event.pull_request.base.sha }}" \
            --head-sha "${{ github.event.pull_request.head.sha }}"

      - name: Build generated artifacts
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Check generated artifacts are committed
        run: git diff --exit-code -- metadata.json skills skills_index.json dist docs/CATALOG.md
